<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-boxes"></i> Product Management System</h1>
            <button id="addProductBtn" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Product
            </button>
        </header>

        <div class="filters">
            <div class="filter-group">
                <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
                <select id="companyFilter" class="filter-select">
                    <option value="">All Companies</option>
                    <option value="apple">Apple</option>
                    <option value="samsung">Samsung</option>
                    <option value="dell">Dell</option>
                    <option value="mi">MI</option>
                </select>
                <select id="sortSelect" class="filter-select">
                    <option value="">Sort by...</option>
                    <option value="name">Name (A-Z)</option>
                    <option value="-name">Name (Z-A)</option>
                    <option value="price">Price (Low-High)</option>
                    <option value="-price">Price (High-Low)</option>
                    <option value="rating">Rating (Low-High)</option>
                    <option value="-rating">Rating (High-Low)</option>
                </select>
                <button id="refreshBtn" class="btn btn-secondary">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </div>

        <div class="table-container">
            <table id="productsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Company</th>
                        <th>Price</th>
                        <th>Rating</th>
                        <th>Featured</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="productsBody">
                    <!-- Products will be loaded here -->
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button id="prevBtn" class="btn btn-secondary" disabled>
                <i class="fas fa-chevron-left"></i> Previous
            </button>
            <span id="pageInfo">Page 1</span>
            <button id="nextBtn" class="btn btn-secondary">
                Next <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <!-- Add/Edit Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Product</h2>
                <span class="close">&times;</span>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Name:</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Price:</label>
                    <input type="number" id="productPrice" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="productCompany">Company:</label>
                    <select id="productCompany" required>
                        <option value="">Select Company</option>
                        <option value="apple">Apple</option>
                        <option value="samsung">Samsung</option>
                        <option value="dell">Dell</option>
                        <option value="mi">MI</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="productRating">Rating:</label>
                    <input type="number" id="productRating" step="0.1" min="0" max="5" value="4.9">
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="productFeatured">
                        Featured Product
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content small-modal">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <span class="close">&times;</span>
            </div>
            <p>Are you sure you want to delete this product?</p>
            <div class="modal-actions">
                <button id="deleteCancelBtn" class="btn btn-secondary">Cancel</button>
                <button id="deleteConfirmBtn" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
